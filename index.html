<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Trenażer pełny</title>

<style>
body{font-family:Arial;max-width:1100px;margin:auto;background:#f2f4fb;padding:20px}
.box{background:white;padding:20px;border-radius:10px}
button{margin:4px;padding:8px 12px}
.correct{background:#b7f5b7}
.wrong{background:#f7b7b7}
.word{background:#ddd;padding:6px;margin:4px;display:inline-block;cursor:grab}
.drop{border:2px dashed #666;padding:10px;min-width:150px;display:inline-block}
#ua{margin-top:10px;font-style:italic}
</style>
</head>

<body>

<h2>Trenażer języka polskiego</h2>

<div>Punkty: <span id="score">0</span>/<span id="total"></span></div>
<div>Ćwiczenie: <span id="nr"></span></div>

<div class="box">

<div id="q"></div>

<button onclick="listen()">🔊 Posłuchaj</button>
<button onclick="hint()">💡 Podpowiedź</button>

<br>

<button onclick="mode='input';render()">Wpisz</button>
<button onclick="mode='test';render()">Test</button>
<button onclick="mode='drag';render()">Drag</button>

<div id="task"></div>
<div id="ua"></div>

</div>

<button onclick="prev()">⬅</button>
<button onclick="next()">➡</button>
<button onclick="shuffle()">🎲</button>

<script>

"śmieć":["śmiem","śmiesz","śmie","śmiemy","śmiecie","śmieją"]

{id:"4.1.1",s:"Ja nie ___ kłamać.",v:"umieć",a:"umiem",ua:"Я не вмію брехати"},
{id:"4.1.2",s:"A ty ___?",v:"umieć",a:"umiesz",ua:"А ти вмієш?"},
{id:"4.2",s:"Janek nic nie ___ o spotkaniu.",v:"wiedzieć",a:"wie",ua:"Янек нічого не знає"},

{id:"4.7",s:"___ że nic nie wiem.",v:"wiedzieć",a:"wiem",ua:"Я знаю"},
{id:"4.8",s:"Nie ___ nic.",v:"wiedzieć",a:"wiem",ua:"Я не знаю"},
{id:"4.9",s:"Nie ___ zabierać głosu.",v:"śmieć",a:"śmiem",ua:"Я не смію"},
{id:"4.10",s:"Czy ty ___ wybaczać?",v:"umieć",a:"umiesz",ua:"Ти вмієш?"},

// ===== ĆWICZENIE 5 =====

{id:"8.2",s:"___ że ma pan apetyt.",v:"wiedzieć",a:"wiem",ua:"Я знаю"},
{id:"8.3",s:"Nie ___ pan odmówić.",v:"umieć",a:"umie",ua:"Ви не вмієте"},
{id:"8.4",s:"Czy ___ pan?",v:"wiedzieć",a:"wie",ua:"Чи ви знаєте"},
{id:"8.5",s:"Jak ___ pana pouczać?",v:"śmieć",a:"śmiem",ua:"Як я смію"},
{id:"8.6",s:"___ co robię.",v:"wiedzieć",a:"wiem",ua:"Я знаю"},
{id:"8.7",s:"Nie ___ zachowania.",v:"rozumieć",a:"rozumiem",ua:"Я не розумію"},

let i=0,score=0,mode="input"
document.getElementById("total").innerText=ex.length

function render(){
let e=ex[i]
document.getElementById("nr").innerText=e.id
//показує питання
if(e.v) {
        document.getElementById("q").innerText = e.s + " (" + e.v + ")";
    } else {
        document.getElementById("q").innerText = e.s;
    }
    
    document.getElementById("ua").innerText = ""

let t=document.getElementById("task")
t.innerHTML=""

if(e.v){

if(mode=="input"){
t.innerHTML="<input id='a'><button onclick='check()'>OK</button>"
}

if(mode=="test"){
let arr=[e.a]
while(arr.length<4){
let v=verbs[e.v][Math.floor(Math.random()*6)]
if(!arr.includes(v))arr.push(v)
}
arr.sort(()=>Math.random()-0.5)
arr.forEach(o=>{
let b=document.createElement("button")
b.innerText=o
b.onclick=()=>check(o,b)
t.appendChild(b)
})
}

if(mode=="drag"){
let drop=document.createElement("div")
drop.className="drop"
drop.innerText="___"
drop.ondrop=ev=>{
ev.preventDefault()
let w=ev.dataTransfer.getData("text")
if(w==e.a){
drop.innerText=w
score++
update()
speak()
showUA(e.ua)
}else setTimeout(render,500)
}
drop.ondragover=e=>e.preventDefault()
t.appendChild(drop)

let arr=[e.a]
while(arr.length<4){
let v=verbs[e.v][Math.floor(Math.random()*6)]
if(!arr.includes(v))arr.push(v)
}
arr.forEach(w=>{
let s=document.createElement("span")
s.className="word"
s.innerText=w
s.draggable=true
s.ondragstart=e=>e.dataTransfer.setData("text",w)
t.appendChild(s)
})
}
}
if(e.opts && mode=="test"){
e.opts.forEach(o=>{
let b=document.createElement("button")
b.innerText=o
b.onclick=()=>check(o,b)
t.appendChild(b)
})
}
}

function check(val,btn){
let e=ex[i]
if(!val)val=document.getElementById("a").value
if(val==e.a){
if(btn)btn.classList.add("correct")
score++
update()
speak()
showUA(e.ua)
}else if(btn)btn.classList.add("wrong")
}

function showUA(t){document.getElementById("ua").innerText="UA: "+t}
function update(){document.getElementById("score").innerText=score}

let plVoice = null
function loadVoices(){
let voices = speechSynthesis.getVoices()

// шукаємо будь-який польський голос
plVoice = voices.find(v => v.lang.toLowerCase().includes("pl"))

console.log("VOICE:", plVoice)
}

// інколи голоси грузяться асинхронно
speechSynthesis.onvoiceschanged = loadVoices

// fallback
loadVoices()

function speak(){
let e=ex[i]

let utter=new SpeechSynthesisUtterance(
e.s.replace("___", e.a)
)

utter.lang = "pl-PL"

if(plVoice){
utter.voice = plVoice
}

utter.rate = 0.95

// 🔥 КЛЮЧОВЕ
utter.onend = () => {
setTimeout(() => {
next()
}, 500)
}

speechSynthesis.cancel()
speechSynthesis.speak(utter)
}

function listen(){
let e=ex[i]

let utter=new SpeechSynthesisUtterance(
e.s.replace("___","...")
)

utter.lang = "pl-PL"

if(plVoice){
utter.voice = plVoice
}

utter.rate = 0.95

speechSynthesis.cancel()
speechSynthesis.speak(utter)
}
function hint(){
let e=ex[i]
if(e.v)alert(e.v+" → "+verbs[e.v].join(" "))
}

function next(){if(i<ex.length-1)i++;render()}
function prev(){if(i>0)i--;render()}
function shuffle(){ex.sort(()=>Math.random()-0.5);i=0;render()}

render()

</script>

</body>
</html>
