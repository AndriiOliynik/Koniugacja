let i=0,score=0,mode="input"
document.getElementById("total").innerText=ex.length

function render() {
    let e = ex[i];
    document.getElementById("nr").innerText = e.id;
    document.getElementById("ua").innerText = "";
    
    let t = document.getElementById("task");
    t.innerHTML = "";

    let displaySentence = e.s;
    let hintText = "";

    // 1. ЛОГІКА ОБРОБКИ ПИТАННЯ ТА СИНЬОЇ ПІДКАЗКИ
    if (e.v || e.opts) {
        // Шукаємо текст у дужках (...)
        let match = e.s.match(/\((.*)\)/);
        
        if (match) {
            hintText = match[1]; // Те, що було в дужках
            // Видаляємо дужки з речення, щоб вони не дублювалися
            displaySentence = e.s.replace(/\(.*\)/, "");
        } else if (e.v) {
            hintText = e.v; // Якщо дужок немає, беремо інфінітив з поля v
        }

        // Додаємо синю підказку в кінець речення
        displaySentence += ` <span style='color: #007bff; font-weight: bold;'>(${hintText})</span>`;
    }

    document.getElementById("q").innerHTML = displaySentence;

    // 2. ЛОГІКА РЕЖИМІВ (INPUT, TEST, DRAG)
    if (mode === "input") {
        t.innerHTML = `<input id="a" autocomplete="off" onkeypress="if(event.key==='Enter') check()"><button onclick="check()">OK</button>`;
        setTimeout(() => document.getElementById("a").focus(), 10);
    }

    if (mode === "test") {
        let choices = e.v ? [e.a] : [...e.opts];
        if (e.v) {
            while (choices.length < 4) {
                let v = verbs[e.v][Math.floor(Math.random() * 6)];
                if (!choices.includes(v)) choices.push(v);
            }
        }
        choices.sort(() => Math.random() - 0.5);
        choices.forEach(o => {
            let b = document.createElement("button");
            b.innerText = o;
            b.onclick = () => check(o, b);
            t.appendChild(b);
        });
    }

    if (mode === "drag") {
        let drop = document.createElement("div");
        drop.className = "drop";
        drop.innerText = "___";
        drop.ondrop = ev => {
            ev.preventDefault();
            let w = ev.dataTransfer.getData("text");
            if (w == e.a) {
                drop.innerText = w;
                drop.classList.add("correct");
                score++; update(); speak(); showUA(e.ua);
            } else {
                drop.classList.add("wrong");
                setTimeout(render, 500);
            }
        };
        drop.ondragover = ev => ev.preventDefault();
        t.appendChild(drop);

        let words = e.v ? [e.a] : [...e.opts];
        if (e.v) {
            while (words.length < 4) {
                let v = verbs[e.v][Math.floor(Math.random() * 6)];
                if (!words.includes(v)) words.push(v);
            }
        }
        words.sort(() => Math.random() - 0.5);
        words.forEach(w => {
            let s = document.createElement("span");
            s.className = "word";
            s.innerText = w;
            s.draggable = true;
            s.ondragstart = ev => ev.dataTransfer.setData("text", w);
            t.appendChild(s);
        });
    }
}function check(val, btn) {
    let e = ex[i];
    let inputField = document.getElementById("a");
    
    // Якщо val не передано (режим input), беремо текст з поля
    if (!val && inputField) val = inputField.value.trim();

    if (val == e.a) {
        if (btn) btn.classList.add("correct");
        if (inputField) inputField.classList.add("correct");
        score++;
        update();
        speak(); // Озвучка сама перемкне на наступне через 0.5с
        showUA(e.ua);
    } else {
        if (btn) btn.classList.add("wrong");
        if (inputField) {
            inputField.classList.add("wrong");
            setTimeout(() => inputField.classList.remove("wrong"), 500);
        }
    }
}
function showUA(t) {
    let uaDiv = document.getElementById("ua");
    if (uaDiv.innerText.includes(t)) {
        uaDiv.innerText = ""; // Сховати, якщо вже показано
    } else {
        uaDiv.innerText = "UA: " + t; // Показати
    }
}
function update(){document.getElementById("score").innerText=score}

let plVoice = null
function loadVoices(){
let voices = speechSynthesis.getVoices()

// шукаємо будь-який польський голос
plVoice = voices.find(v => v.lang.toLowerCase().includes("pl"))

console.log("VOICE:", plVoice)
}

// інколи голоси грузяться асинхронно
speechSynthesis.onvoiceschanged = loadVoices

// fallback
loadVoices()

function speak() {
    let e = ex[i];
    let textToSpeak = e.s;

    // 1. Якщо в реченні є дужки (як у вправах 5, 7, 8), замінюємо їх на відповідь
    if (textToSpeak.includes("(")) {
        textToSpeak = textToSpeak.replace(/\(.*\)/, e.a);
    } 
    
    // 2. Якщо залишилися підкреслення ___ (як у вправі 2), замінюємо їх на відповідь
    if (textToSpeak.includes("___")) {
        textToSpeak = textToSpeak.replace("___", e.a);
    }

    // 3. На випадок, якщо підкреслень не було, а відповідь просто треба вставити (захист)
    if (textToSpeak === e.s && !e.s.includes(e.a)) {
        // Якщо текст не змінився, просто додаємо відповідь в кінець (опційно)
        // textToSpeak = e.s + " " + e.a; 
    }

    let utter = new SpeechSynthesisUtterance(textToSpeak);
    utter.lang = "pl-PL";
    if (plVoice) utter.voice = plVoice;
    utter.rate = 0.9;

    // Автоматичний перехід до наступного питання
    utter.onend = () => {
        setTimeout(() => {
            next();
        }, 500);
    };

    speechSynthesis.cancel();
    speechSynthesis.speak(utter);
}

function listen(){
let e=ex[i]

let utter=new SpeechSynthesisUtterance(
e.s.replace("___","...")
)

utter.lang = "pl-PL"

if(plVoice){
utter.voice = plVoice
}

utter.rate = 0.95

speechSynthesis.cancel()
speechSynthesis.speak(utter)
}
function hint(){
let e=ex[i]
if(e.v)alert(e.v+" → "+verbs[e.v].join(" "))
}

function next(){if(i<ex.length-1)i++;render()}
function prev(){if(i>0)i--;render()}
function shuffle(){ex.sort(()=>Math.random()-0.5);i=0;render()}

render()
function initExNavigation() {
    const nav = document.getElementById("nav-exercises");
    nav.innerHTML = ""; // Очищуємо

    // Знаходимо унікальні префікси вправ (напр. "2", "3", "7")
    const exerciseNumbers = [...new Set(ex.map(item => item.id.split('.')[0]))];

    exerciseNumbers.forEach(num => {
        let btn = document.createElement("button");
        btn.className = "ex-nav-btn";
        btn.innerText = "Ćw " + num;
        btn.onclick = () => {
            // Шукаємо індекс першого елемента цієї вправи
            let firstIndex = ex.findIndex(item => item.id.startsWith(num + "."));
            if (firstIndex !== -1) {
                i = firstIndex;
                render();
            }
        };
        nav.appendChild(btn);
    });
}

// Викликаємо функцію створення навігації один раз при старті
initExNavigation();

</script>
